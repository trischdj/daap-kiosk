<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DAAP — Send Your Image</title>
<link rel="stylesheet" href="https://use.typekit.net/odf8bjs.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #fff;
    font-family: 'gotham', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 0;
  }

  .logo {
    font-family: 'gotham-ultra', 'gotham', sans-serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #fff;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 48px;
    text-align: center;
  }

  .preview-wrap {
    width: 100%;
    max-width: 340px;
    aspect-ratio: 4/3;
    background: rgba(255,255,255,0.06);
    border: 1.5px dashed rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  #preview {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }
  .preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .preview-placeholder svg {
    opacity: 0.3;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 14px;
  }

  .btn {
    flex: 1;
    padding: 16px 12px;
    font-family: 'gotham', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-camera {
    background: #fff;
    color: #111;
  }
  .btn-camera:hover { background: #e8e8e8; }

  .btn-library {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-library:hover { background: rgba(255,255,255,0.16); }

  /* Hidden file inputs */
  #input-camera  { display: none; }
  #input-library { display: none; }

  .btn-send {
    width: 100%;
    max-width: 340px;
    padding: 18px;
    background: #e00122;
    color: #fff;
    font-family: 'gotham-ultra', 'gotham', sans-serif;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0.35;
    pointer-events: none;
  }
  .btn-send.ready {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-send.ready:hover { background: #c0001e; }
  .btn-send.sending { background: #555; }

  .status {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    text-align: center;
    min-height: 18px;
  }
  .status.ok  { color: #8FAF9F; }
  .status.err { color: #e00122; }

  .hint {
    margin-top: 32px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    text-align: center;
    line-height: 1.8;
    max-width: 280px;
  }
</style>
</head>
<body>

<div class="logo">DAAP</div>
<div class="sub">Send image to kiosk</div>

<div class="preview-wrap" id="preview-wrap">
  <img id="preview" alt="preview">
  <div class="preview-placeholder" id="placeholder">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <rect x="2" y="8" width="36" height="26" rx="2" stroke="white" stroke-width="1.5"/>
      <circle cx="20" cy="21" r="7" stroke="white" stroke-width="1.5"/>
      <rect x="14" y="4" width="12" height="6" rx="1" stroke="white" stroke-width="1.5"/>
    </svg>
    <span>No image selected</span>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-camera" id="btn-camera">📷 Camera</button>
  <button class="btn btn-library" id="btn-library">🖼 Library</button>
</div>

<!-- Separate file inputs for camera vs library -->
<input type="file" id="input-camera"  accept="image/*" capture="environment">
<input type="file" id="input-library" accept="image/*">

<button class="btn-send" id="btn-send">Send to Kiosk →</button>

<div class="status" id="status"></div>

<div class="hint">
  Your image will appear on the<br>
  DAAP kiosk within a few seconds.
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// This BIN_ID and API_KEY must match the kiosk page.
// Replace with your own from jsonbin.io (free, takes 2 min).
const BIN_ID  = '__DAAP_BIN_ID__';
const API_KEY = '__DAAP_API_KEY__';
const JSONBIN = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ── STATE ─────────────────────────────────────────────────────────────────────
let imageBase64 = null;

// ── ELEMENTS ──────────────────────────────────────────────────────────────────
const preview     = document.getElementById('preview');
const placeholder = document.getElementById('placeholder');
const btnSend     = document.getElementById('btn-send');
const status      = document.getElementById('status');

// ── FILE HANDLING ─────────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  // Resize to max 1200px wide before encoding — keeps payload small
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      imageBase64 = canvas.toDataURL('image/jpeg', 0.82);

      preview.src = imageBase64;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      btnSend.classList.add('ready');
      status.textContent = '';
      status.className = 'status';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('btn-camera').addEventListener('click', () => {
  document.getElementById('input-camera').click();
});
document.getElementById('btn-library').addEventListener('click', () => {
  document.getElementById('input-library').click();
});
document.getElementById('input-camera').addEventListener('change',  e => handleFile(e.target.files[0]));
document.getElementById('input-library').addEventListener('change', e => handleFile(e.target.files[0]));

// ── SEND ──────────────────────────────────────────────────────────────────────
btnSend.addEventListener('click', async () => {
  if (!imageBase64) return;
  btnSend.classList.remove('ready');
  btnSend.classList.add('sending');
  btnSend.textContent = 'Sending…';
  status.textContent = '';
  status.className = 'status';

  try {
    const payload = {
      image: imageBase64,
      ts: Date.now(),
      from: 'mobile',
    };
    const res = await fetch(JSONBIN, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY,
        'X-Bin-Versioning': 'false',
      },
      body: JSON.stringify(payload),
    });

    if (!res.ok) throw new Error('Upload failed');

    btnSend.textContent = '✓ Sent!';
    btnSend.style.background = '#8FAF9F';
    status.textContent = 'Image received by kiosk';
    status.className = 'status ok';

    // Reset after 4s
    setTimeout(() => {
      btnSend.textContent = 'Send to Kiosk →';
      btnSend.style.background = '';
      btnSend.classList.remove('sending');
      // Don't re-enable — one send per session at the kiosk
    }, 4000);

  } catch(e) {
    btnSend.textContent = 'Send to Kiosk →';
    btnSend.classList.remove('sending');
    btnSend.classList.add('ready');
    status.textContent = 'Failed — check connection';
    status.className = 'status err';
  }
});
</script>
</body>
</html>
