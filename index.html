<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAAP Generative Identity — v0.5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root {
    --uc-red: #e00122;
    --bg: #dddbd8;
    --panel: #ffffff;
    --border: rgba(0,0,0,0.08);
    --label: rgba(0,0,0,0.32);
    --text: #111;
    --ui: 'gotham', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'gotham', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: auto 1fr;
  }

  header {
    grid-column: 1/-1;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hd-left { display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-family: var(--ui); font-weight: 900; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; }
  header .ver { font-family: var(--ui); font-size: 10px; letter-spacing: 0.14em; color: var(--label); text-transform: uppercase; }
  .wx-badge { display: flex; align-items: center; gap: 7px; font-family: var(--ui); font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--label); }
  .wx-dot { width: 5px; height: 5px; background: #8FAF9F; border-radius: 50%; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .sect { padding: 18px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .sect:last-child { border-bottom: none; }
  .slbl { font-family: var(--ui); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--label); }

  .plist { display: flex; flex-direction: column; gap: 3px; }
  .pbtn {
    background: transparent; border: 1px solid var(--border);
    color: rgba(0,0,0,0.38); padding: 8px 11px;
    font-family: var(--ui); font-size: 12px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    cursor: pointer; text-align: left; transition: all 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .pbtn:hover { color: var(--text); border-color: rgba(0,0,0,0.22); background: rgba(0,0,0,0.02); }
  .pbtn.active { color: var(--text); border-color: var(--pc,#111); background: rgba(0,0,0,0.03); }
  .psw { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .srow { display: flex; flex-direction: column; gap: 5px; }
  .srow label { display: flex; justify-content: space-between; font-family: var(--ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--label); }
  .srow label span { color: rgba(0,0,0,0.65); font-weight: 700; }
  input[type=range] { width: 100%; -webkit-appearance: none; height: 1.5px; background: rgba(0,0,0,0.14); outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--text); border-radius: 50%; }

  .fchips { display: flex; flex-wrap: wrap; gap: 4px; }
  .fchip {
    background: transparent; border: 1px solid var(--border);
    color: rgba(0,0,0,0.36); padding: 4px 8px;
    font-family: var(--ui); font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase;
    cursor: pointer; transition: all 0.1s;
  }
  .fchip:hover { border-color: rgba(0,0,0,0.28); color: var(--text); }
  .fchip.active { border-color: rgba(0,0,0,0.5); color: var(--text); background: rgba(0,0,0,0.04); }

  .upzone {
    border: 1.5px dashed rgba(0,0,0,0.16); padding: 13px; text-align: center;
    cursor: pointer; font-family: var(--ui); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--label); position: relative; transition: all 0.12s;
  }
  .upzone:hover { border-color: rgba(0,0,0,0.35); color: var(--text); }
  .upzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  #upthumb { width: 100%; height: 55px; object-fit: cover; margin-top: 8px; display: none; }

  .arow { display: flex; gap: 5px; }
  .abtn {
    flex: 1; border: none; padding: 11px 6px;
    font-family: var(--ui); font-size: 10px; font-weight: 900;
    letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.12s;
  }
  .abtn.flip { background: #111; color: #fff; }
  .abtn.flip:hover { background: #333; }
  .abtn.regen { background: var(--uc-red); color: #fff; }
  .abtn.regen:hover { background: #c0001e; }

  main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px; gap: 18px; position: relative;
  }

  .scene { perspective: 1400px; width: 640px; height: 494px; }
  .flipper {
    width: 100%; height: 100%;
    position: relative; transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4,0,0.2,1);
  }
  .flipper.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 2px;
    box-shadow: 0 6px 50px rgba(0,0,0,0.16), 0 2px 10px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  .face.back { transform: rotateY(180deg); }
  canvas { display: block; width: 100%; height: 100%; }

  .legend {
    display: flex; gap: 18px; flex-wrap: wrap;
    font-family: var(--ui); font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(0,0,0,0.28);
  }
  .legend b { color: rgba(0,0,0,0.5); font-weight: 700; }

  /* Campus slider */
  .campus-ends {
    display: flex; justify-content: space-between;
    font-family: var(--ui); font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--label);
    margin-bottom: 4px;
  }
  .campus-hint {
    font-family: var(--ui); font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: rgba(0,0,0,0.4);
    text-align: center; margin-top: 5px;
  }

  
  .wtoggle { display:flex; gap:3px; }
  .wbtn {
    flex:1; background:transparent; border:1px solid var(--border);
    color:rgba(0,0,0,0.38); padding:7px 6px;
    font-family:var(--ui); font-size:10px; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; transition:all 0.1s;
  }
  .wbtn:hover { color:var(--text); border-color:rgba(0,0,0,0.3); }
  .wbtn.active { background:#111; color:#fff; border-color:#111; }

  input[type=datetime-local] {
    font-family: var(--ui); font-size: 11px; padding: 6px 8px;
    border: 1px solid var(--border); background: #fff;
    color: var(--text); letter-spacing: 0.04em; outline: none;
    width: 100%; cursor: pointer;
  }

  
    font-family: var(--ui); font-size: 9px; letter-spacing: 0.1em;
    color: rgba(0,0,0,0.2); text-align: right; line-height: 2; text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div class="hd-left">
    <h1>DAAP Generative Identity</h1>
    <span class="ver">v0.5</span>
  </div>
</header>

<aside>
  <div class="sect">
    <div class="slbl">Who are you sending this to?</div>
    <div class="plist" id="recip-group">

      <button class="pbtn" data-r="friend"           style="--pc:#890519"><span class="psw" style="background:#890519"></span>Friend or Family</button>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// No credentials needed — the API routes are relative to this same Vercel deployment.
// Just set MOBILE_URL to your Vercel domain once deployed.
const MOBILE_URL = 'https://daap-kiosk-git-main-dj-trischlers-projects.vercel.app/upload.html';

// ── QR CODE ───────────────────────────────────────────────────────────────────
function initQR() {
  const el = document.getElementById('qr-code');
  if (!el) return;
  if (MOBILE_URL.includes('your-project')) {
    el.innerHTML = `<div style="width:120px;height:120px;background:#f0eeeb;display:flex;align-items:center;justify-content:center;font-family:var(--ui);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(0,0,0,0.35);text-align:center;padding:12px;">Set MOBILE_URL<br>after deploy</div>`;
    return;
  }
  new QRCode(el, {
    text: MOBILE_URL,
    width: 120, height: 120,
    colorDark: '#111111', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });
}

// ── POLLING — check /api/receive every 3s for a new image ────────────────────
let lastTs = 0;
let pollInterval = null;

async function pollForImage() {
  try {
    const res = await fetch('/api/receive');
    if (!res.ok) return;
    const data = await res.json();

    if (data && data.ts && data.ts !== lastTs && data.image) {
      lastTs = data.ts;
      const img = new Image();
      img.onload = () => {
        S.img = img;
        const th = document.getElementById('upthumb');
        if (th) { th.src = data.image; th.style.display = 'block'; }
        document.getElementById('uplbl').textContent = '✓ Image from phone';
        document.getElementById('poll-status').textContent = '✓ Image received';
        document.getElementById('poll-status').style.color = '#8FAF9F';
        S.seed = Math.random() * 9999;
        redraw();
        setTimeout(() => {
          document.getElementById('poll-status').textContent = 'Waiting for image…';
          document.getElementById('poll-status').style.color = '';
        }, 4000);
      };
      img.src = data.image;
    }
  } catch(e) { /* silent fail */ }
}


const RECIP = {
  student: { label:'Student',         primary:'#B8011C', secondary:'#7a000f' },
  faculty: { label:'Faculty or Staff', primary:'#D1B179', secondary:'#b8924a' },
  friend:  { label:'Friend or Family', primary:'#890519', secondary:'#5c0210' },
  alumni:  { label:'Alumni or Guest',  primary:'#FCECDF', secondary:'#e0c9aa' },
};

const PROG = {
  fashion: { label:'Fashion Design',       frag:0.40 },
  comdes:  { label:'Communication Design', frag:0.28 },
  inddes:  { label:'Industrial Design',    frag:0.38 },
  mdes:    { label:'Master of Design',     frag:0.62 },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  recip:'student',
  program:'fashion', filter:'none',
  campus: 0,
  seed: Math.random()*9999,
  img: null,
  message: 'THANK YOU!',
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function srand(seed){ let s=Math.floor(seed); return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }
function hex2rgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function rgba(h,a){ const [r,g,b]=hex2rgb(h); return `rgba(${r},${g},${b},${a})`; }
function lum(h){ const [r,g,b]=hex2rgb(h); return (0.299*r+0.587*g+0.114*b)/255; }
function dirLabel(d){ return ['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8]; }
function fmtHour(h){ const ap=h>=12?'PM':'AM'; return `${h%12||12}:00 ${ap}`; }

// ── ARONOFF BUILDING GEOMETRY ─────────────────────────────────────────────────
//
// Four principles from the building encoded directly:
//
// 1. NON-ORTHOGONAL LEAN — the whole body shears with wind direction & speed.
//    Each corner moves independently, like a building whose walls tilt at
//    different rates. At 0 wind: nearly rectangular. At max: dramatically skewed.
//
// 2. BURIED RIGHT ANGLES — all cuts are strictly 90° (step/L) or 45° (chamfer).
//    The chaos reads as organic but every vertex is a right angle in disguise.
//    "Double step" cuts nest two L-shapes — the interlocking volume effect.
//
// 3. DECONSTRUCTIVIST STAIR-STEPS — mid-edge protrusions simulate Eisenman's
//    stair-stepped rooflines and intersecting floor plates. They always move
//    strictly H or V, never diagonal, creating the "buried right angle" in lean.
//
// 4. MARGIN ENFORCEMENT — every point is hard-clamped to a 0.25" safe zone
//    (24px at canvas resolution). No point ever touches the edge.
//
function buildShape(W, H, rand, frag, windX, windY) {
  // 0.25" safe margin — at 1100px wide representing 5.5", that's 1100/5.5*0.25 = 50px
  const SAFE = 50;
  function clamp(x, lo, hi){ return Math.max(lo, Math.min(hi, x)); }
  function p(x, y){ return [ clamp(x, SAFE, W-SAFE), clamp(y, SAFE, H-SAFE) ]; }

  // Base inset for the shape's rectangle before cuts
  const M = 68;

  // ── 1. NON-ORTHOGONAL LEAN ──
  // Each corner shifts independently with wind — simulates leaning/folding walls.
  // Corners on the windward side push more than leeward, creating true shear.
  const TL = p(M + windX*0.90,     M + windY*0.80);
  const TR = p(W-M + windX*1.20,   M - windY*1.10);
  const BR = p(W-M + windX*0.20,   H-M + windY*0.90);
  const BL = p(M - windX*0.70,     H-M - windY*0.50);

  // ── 2. CUT DEPTH (frag-driven, per-corner variation) ──
  // Low frag (ComDes): shallow cuts, shape stays close to rectangle
  // High frag (MDesign): deep cuts that consume 1/4+ of each side
  const baseD = 45 + frag * 145; // 45px → 190px
  function vD(scale=1){ return baseD * scale * (0.70 + rand()*0.60); }

  // ── NOTCH PRIMITIVES — all strictly 90° or 45° ──
  // Every point is clamped, so cuts can never escape the safe zone.

  // Chamfer: single 45° diagonal across corner
  function chamfer(cx,cy, ax,ay, bx,by, d){
    return [ p(cx+ax*d, cy+ay*d), p(cx+bx*d, cy+by*d) ];
  }

  // Step (L-cut): 90° bite — one buried right angle
  function step(cx,cy, ax,ay, bx,by, d){
    const d2 = d * (0.40 + rand()*0.55);
    return [
      p(cx+ax*d,         cy+ay*d        ),
      p(cx+ax*d+bx*d2,   cy+ay*d+by*d2  ),
      p(cx+bx*d,         cy+by*d        ),
    ];
  }

  // Double step: two nested L-cuts — the "interlocking volumes" read.
  // Creates a stair-step notch with two depth levels.
  function doubleStep(cx,cy, ax,ay, bx,by, d){
    const d1 = d * 0.60;
    const s1 = d * (0.28 + rand()*0.22);
    const d2 = d * (0.88 + rand()*0.12);
    const s2 = d * (0.20 + rand()*0.18);
    return [
      p(cx+ax*d1,             cy+ay*d1            ),
      p(cx+ax*d1+bx*s1,       cy+ay*d1+by*s1      ),
      p(cx+ax*(d1+d1*0.3)+bx*s1, cy+ay*(d1+d1*0.3)+by*s1 ),
      p(cx+ax*(d1+d1*0.3)+bx*(s1+s2), cy+ay*(d1+d1*0.3)+by*(s1+s2) ),
      p(cx+ax*d2+bx*(s1+s2),  cy+ay*d2+by*(s1+s2) ),
      p(cx+bx*d,              cy+by*d             ),
    ];
  }

  // Pick notch style based on frag — higher frag → more complex cuts
  function notchStyle(){
    const r = rand();
    if(frag < 0.32) return r < 0.65 ? 'chamfer' : 'step';
    if(frag < 0.50) return r < 0.30 ? 'chamfer' : r < 0.72 ? 'step' : 'double';
    return r < 0.15 ? 'chamfer' : r < 0.52 ? 'step' : 'double';
  }

  function applyNotch(cx,cy, ax,ay, bx,by){
    const d = vD();
    const s = notchStyle();
    if(s==='chamfer') return chamfer(cx,cy,ax,ay,bx,by,d);
    if(s==='step')    return step(cx,cy,ax,ay,bx,by,d);
    return doubleStep(cx,cy,ax,ay,bx,by,d);
  }

  // ── 3. STAIR-STEP MID-EDGE PROTRUSIONS ──
  // Simulates Eisenman's stair-stepped floor plates and intersecting rooflines.
  // Protrusions are always strictly horizontal or vertical — right angles in lean.
  // Probability and depth scale with frag.
  function midJog(ax,ay, bx,by, edgeFrac, isHoriz){
    if(rand() > 0.42 + frag*0.5) return []; // skip sometimes at low frag
    const t   = 0.30 + rand()*0.40;          // position along edge
    const mx  = ax + (bx-ax)*t;
    const my  = ay + (by-ay)*t;
    const jd  = 28 + rand()*110*frag;        // protrusion depth
    const hw  = 22 + rand()*90*frag;         // half-width of step
    const dir = rand() < 0.52 ? 1 : -1;

    if(isHoriz){
      // Top/bottom edge: jog goes up/down (vertical protrusion)
      return [
        p(mx-hw, my),
        p(mx-hw, my+dir*jd),
        p(mx+hw, my+dir*jd),
        p(mx+hw, my),
      ];
    } else {
      // Left/right edge: jog goes left/right (horizontal protrusion)
      return [
        p(mx,        my-hw),
        p(mx+dir*jd, my-hw),
        p(mx+dir*jd, my+hw),
        p(mx,        my+hw),
      ];
    }
  }

  // ── ASSEMBLE POLYGON ──
  const pts = [];

  // TL corner
  pts.push(...applyNotch(TL[0],TL[1],  0,1,  1,0));
  // Top edge stair-step
  pts.push(...midJog(TL[0],TL[1], TR[0],TR[1], 0, true));
  // TR corner
  pts.push(...applyNotch(TR[0],TR[1], -1,0,  0,1));
  // Right edge stair-step
  pts.push(...midJog(TR[0],TR[1], BR[0],BR[1], 0, false));
  // BR corner
  pts.push(...applyNotch(BR[0],BR[1],  0,-1, -1,0));
  // Bottom edge stair-step
  pts.push(...midJog(BR[0],BR[1], BL[0],BL[1], 0, true));
  // BL corner
  pts.push(...applyNotch(BL[0],BL[1],  1,0,  0,-1));
  // Left edge stair-step
  pts.push(...midJog(BL[0],BL[1], TL[0],TL[1], 0, false));

  return pts;
}

function tracePath(ctx, pts){
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
}

// ── PERIMETER UTILS ───────────────────────────────────────────────────────────
function perimLen(pts){
  let l=0;
  for(let i=0;i<pts.length;i++){
    const a=pts[i], b=pts[(i+1)%pts.length];
    l+=Math.hypot(b[0]-a[0],b[1]-a[1]);
  }
  return l;
}
function ptOnPerim(pts, dist){
  let rem=dist;
  for(let i=0;i<pts.length;i++){
    const a=pts[i], b=pts[(i+1)%pts.length];
    const seg=Math.hypot(b[0]-a[0],b[1]-a[1]);
    if(rem<=seg||i===pts.length-1){
      const t=Math.min(rem/seg,1);
      const pt=[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
      const dx=b[0]-a[0], dy=b[1]-a[1], len=Math.hypot(dx,dy)||1;
      return {pt, normal:[-dy/len, dx/len]};
    }
    rem-=seg;
  }
  return {pt:pts[0], normal:[0,-1]};
}

// ── IMAGE FILTERS ─────────────────────────────────────────────────────────────
function drawFiltered(ctx, img, ix, iy, iw, ih, filter, primary, secondary){
  const off=document.createElement('canvas'); off.width=iw; off.height=ih;
  const oc=off.getContext('2d');
  const sc=Math.max(iw/img.width, ih/img.height);
  oc.drawImage(img,(iw-img.width*sc)/2,(ih-img.height*sc)/2,img.width*sc,img.height*sc);

  if(filter==='none'){ ctx.drawImage(off,ix,iy); return; }

  const id=oc.getImageData(0,0,iw,ih); const d=id.data;

  if(filter==='pixel'){
    const bs=Math.max(4,Math.round(4+(S.wind/40)*22));
    for(let by=0;by<ih;by+=bs) for(let bx=0;bx<iw;bx+=bs){
      const cx=Math.min(bx+(bs>>1),iw-1), cy=Math.min(by+(bs>>1),ih-1);
      const i4=(cy*iw+cx)*4; const r=d[i4],g=d[i4+1],b=d[i4+2];
      for(let py=by;py<Math.min(by+bs,ih);py++) for(let px=bx;px<Math.min(bx+bs,iw);px++){
        const ii=(py*iw+px)*4; d[ii]=r;d[ii+1]=g;d[ii+2]=b;
      }
    }
    oc.putImageData(id,0,0); ctx.drawImage(off,ix,iy); return;
  }
  if(filter==='halftone'){
    for(let i=0;i<d.length;i+=4){const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];d[i]=d[i+1]=d[i+2]=g;}
    oc.putImageData(id,0,0);
    const o2=document.createElement('canvas');o2.width=iw;o2.height=ih;
    const c2=o2.getContext('2d');
    c2.fillStyle='#fff';c2.fillRect(0,0,iw,ih);
    const dot=9; const [pr,pg,pb]=hex2rgb(primary);
    c2.fillStyle=`rgb(${pr},${pg},${pb})`;
    for(let gy=0;gy<ih;gy+=dot) for(let gx=0;gx<iw;gx+=dot){
      const i4=(Math.min(gy,ih-1)*iw+Math.min(gx,iw-1))*4;
      const rad=(1-d[i4]/255)*(dot/2)*0.92;
      if(rad>0.5){c2.beginPath();c2.arc(gx+dot/2,gy+dot/2,rad,0,Math.PI*2);c2.fill();}
    }
    ctx.drawImage(o2,ix,iy); return;
  }
  if(filter==='thresh'){
    const [pr,pg,pb]=hex2rgb(primary);
    for(let i=0;i<d.length;i+=4){
      const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      d[i]=g<128?pr:255;d[i+1]=g<128?pg:255;d[i+2]=g<128?pb:255;d[i+3]=255;
    }
    oc.putImageData(id,0,0);ctx.drawImage(off,ix,iy);return;
  }
  if(filter==='duotone'){
    const [dr,dg,db]=hex2rgb(primary);const[lr,lg,lb]=hex2rgb(secondary);
    for(let i=0;i<d.length;i+=4){
      const t=(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2])/255;
      d[i]=Math.round(dr+(lr-dr)*t);d[i+1]=Math.round(dg+(lg-dg)*t);
      d[i+2]=Math.round(db+(lb-db)*t);d[i+3]=255;
    }
    oc.putImageData(id,0,0);ctx.drawImage(off,ix,iy);return;
  }
}

// ── DRAW FRONT ────────────────────────────────────────────────────────────────
function drawFront(){
  const cv=document.getElementById('front');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;  // 1100 × 850

  const rand=srand(S.seed);
  const prog=PROG[S.program];
  const recip=RECIP[S.recip];   // color comes from recipient
  const frag=prog.frag;          // shape complexity still from program

  const windNorm = 0; // wind removed — campus slider drives shear only

  // ── CAMPUS SHEAR ──
  // West side (-100): shape leans left — compressed, stair-stepped, introverted
  // Center (0): balanced, minimal lean
  // East side (+100): shape leans right — stretched, splayed, extroverted
  // campusT: -1 to +1
  const campusT = S.campus / 100;
  const windX = campusT * 180;
  const windY = -campusT * 90;

  // White canvas
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,W,H);

  // Build shape
  const pts = buildShape(W, H, rand, frag, windX, windY);

  // ── GHOST SUPERPOSITION PLANES (no stroke) ──
  const nGhosts = frag > 0.45 ? 2 : 1;
  for(let g=nGhosts; g>=1; g--){
    const sx=(rand()-0.5)*frag*70, sy=(rand()-0.5)*frag*48;
    const ghost=pts.map(([x,y])=>[x+sx,y+sy]);
    tracePath(ctx,ghost);
    ctx.fillStyle=rgba(recip.primary, 0.07-(g*0.02));
    ctx.fill();
  }

  // ── FILL: image or solid ──
  if(S.img){
    ctx.save();
    tracePath(ctx,pts); ctx.clip();
    drawFiltered(ctx, S.img, 0, 0, W, H, S.filter, recip.primary, recip.secondary);
    ctx.fillStyle=rgba(recip.primary, S.filter==='none'?0.60:0.46);
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  } else {
    tracePath(ctx,pts);
    ctx.fillStyle=recip.primary;
    ctx.fill();
  }

  // ── NO SHAPE STROKE ──

  // ── TICK MARKS — spread toward leading edges at extremes ──
  // At center: evenly spaced around perimeter
  // At full west/east: ticks bunch toward the sheared leading corners,
  // creating a visual tension that echoes the lean of the shape.
  const numTicks = 8;
  const tickLen  = 28;
  const perim    = perimLen(pts);
  const abs      = Math.abs(campusT); // 0 at center, 1 at full extreme

  // Bias: at extreme east (campusT=1), ticks pull toward the right side of
  // the perimeter (0.5–1.0 of total length). At extreme west, toward left (0–0.5).
  // Achieved by offsetting each tick's parametric position with a sine-based spread.
  const tickPositions = [];
  for(let i=0; i<numTicks; i++){
    const tBase = (i+1) / (numTicks+1); // 0..1 evenly
    // Bias shifts distribution: positive campusT pulls toward second half of perimeter
    const bias  = campusT * abs * 0.32;
    // Apply a push — ticks near the leading edge spread apart, lagging side compresses
    const t     = Math.max(0.02, Math.min(0.98, tBase + bias * Math.sin(tBase * Math.PI)));
    tickPositions.push(t * perim);
  }

  ctx.strokeStyle = rgba(recip.primary, 0.85);
  ctx.lineWidth = 2;
  for(const dist of tickPositions){
    const {pt,normal}=ptOnPerim(pts, dist);
    ctx.beginPath();
    ctx.moveTo(pt[0]+normal[0]*tickLen*0.55, pt[1]+normal[1]*tickLen*0.55);
    ctx.lineTo(pt[0]-normal[0]*tickLen*0.50, pt[1]-normal[1]*tickLen*0.50);
    ctx.stroke();
  }

  // ── TEXT: sized to shape width, 3px bleed past shape left/right edges ──
  const isLight = lum(recip.primary) > 0.50;
  const tC = isLight ? '#000000' : '#FFFFFF';

  ctx.save();
  tracePath(ctx,pts); ctx.clip();

  const lines = S.message.trim().split(/\s+/);

  // Compute shape's horizontal bounding box from polygon
  const shapeMinX = Math.min(...pts.map(([x])=>x));
  const shapeMaxX = Math.max(...pts.map(([x])=>x));
  const shapeW    = shapeMaxX - shapeMinX;

  // Target: shape width + 6px total (3px bleed each side into shape edge)
  const bleed     = 3;
  const targetW   = shapeW + bleed * 2;

  // Measure widest line at probe size, scale to targetW
  const probeSize = 800;
  ctx.font = `normal 900 ${probeSize}px 'gotham-ultra', 'gotham', sans-serif`;
  const maxMeasured = Math.max(...lines.map(l => ctx.measureText(l).width));
  const fontSize = Math.floor((targetW / maxMeasured) * probeSize);

  ctx.font = `normal 900 ${fontSize}px 'gotham-ultra', 'gotham', sans-serif`;
  ctx.fillStyle = tC;
  ctx.textAlign = 'center';

  // Center on the shape's horizontal midpoint
  const shapeCX = shapeMinX + shapeW / 2;
  const lineH   = fontSize * 0.87;
  const totalH  = lineH * lines.length;
  const ty      = (H - totalH) / 2 + lineH * 0.92;

  lines.forEach((line, i) => {
    ctx.fillText(line, shapeCX, ty + i * lineH);
  });

  ctx.textAlign = 'left';
  ctx.restore();
}

// ── DRAW BACK ─────────────────────────────────────────────────────────────────
function drawBack(){
  const cv=document.getElementById('back');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  const recip=RECIP[S.recip];
  const prog=PROG[S.program];

  const grd=ctx.createRadialGradient(0,0,0,0,0,W*0.65);
  grd.addColorStop(0,rgba(recip.primary,0.18));
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  ctx.font=`normal 900 110px 'gotham-ultra', 'gotham', sans-serif`;
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.fillText('DAAP', W/2, H/2+18);

  ctx.font=`300 21px 'gotham', sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.38)';
  ctx.fillText('COLLEGE OF DESIGN  ·  ARCHITECTURE  ·  ART & PLANNING', W/2, H/2+62);

  ctx.strokeStyle=recip.primary; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(W/2-96, H/2+96); ctx.lineTo(W/2+96, H/2+96);
  ctx.stroke();

  ctx.font=`400 15px 'gotham', sans-serif`;
  ctx.fillStyle=rgba(recip.primary,0.65);
  ctx.fillText(prog.label.toUpperCase(), W/2, H/2+128);
  ctx.textAlign='left';
}

function redraw(){ drawFront(); drawBack(); }

// ── PDF DOWNLOAD ──────────────────────────────────────────────────────────────
function downloadPDF(){
  const cv = document.getElementById('front');
  const imgData = cv.toDataURL('image/jpeg', 0.96);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'in', format:[5.5, 4.25] });
  doc.addImage(imgData, 'JPEG', 0, 0, 5.5, 4.25);
  const prog = PROG[S.program];
  const safeLabel = prog.label.replace(/\s+/g,'-').toLowerCase();
  doc.save(`daap-thankyou-${safeLabel}-seed${Math.floor(S.seed)}.pdf`);
}

});

document.getElementById('pg').addEventListener('click',e=>{
  const b=e.target.closest('.pbtn'); if(!b||!b.dataset.p) return;

document.getElementById('campus').addEventListener('input', e=>{
  S.campus = +e.target.value;
  const pct = S.campus;
  const hint = pct < -60 ? 'West Side' : pct > 60 ? 'East Side' : pct === 0 ? 'Center' : pct < 0 ? 'West' : 'East';
  document.getElementById('campus-hint').textContent = hint;
  redraw();
});

});

  S.seed=Math.random()*9999;
  S.img=null;
  const th=document.getElementById('upthumb');
  th.style.display='none'; th.src='';
  document.getElementById('uplbl').textContent='or drop / click to upload';
  redraw();
});
document.getElementById('upin').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const fr=new FileReader();
  fr.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      S.img=img;
      const th=document.getElementById('upthumb');
      th.src=ev.target.result; th.style.display='block';
      document.getElementById('uplbl').textContent='✓ Image loaded';
      S.seed=Math.random()*9999; redraw();
    };
    img.src=ev.target.result;
  };
  fr.readAsDataURL(f);
});
